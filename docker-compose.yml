services:
  web:
    build: ./
    container_name: gymproyecto
    ports:
      - 8088:80
    volumes:
      - ./proyecto:/var/www/html
    depends_on:
      - mysql
  mysql:
    image: mysql:8.0
    container_name: intgym
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: InternationalGym
      MYSQL_USER: intgym
      MYSQL_PASSWORD: 1234
    ports:
      - 3368:3306
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
