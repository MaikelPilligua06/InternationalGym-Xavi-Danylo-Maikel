<VirtualHost *:80>
    ServerName www.internationalgym.com
    Redirect permanent / https://www.internationalgym.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName www.internationalgym.com
    ServerAdmin admin@localhost
    DocumentRoot /var/www/html

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/cert.pem
    SSLCertificateKeyFile /etc/ssl/private/privkey.pem
</VirtualHost>
